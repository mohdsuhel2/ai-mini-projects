services:
  document-generator:
    image: nginx:1.27-alpine
    container_name: document-generator-web
    restart: unless-stopped
    network_mode: host
    privileged: true
    pid: host
    environment:
      CERT_EMAIL: admin@noobius.in
    volumes:
      - /var/lib/docforge/letsencrypt:/etc/letsencrypt
      - /var/lib/docforge/certbot-www:/var/www/certbot
    command:
      - /bin/sh
      - -c
      - >-
        apk add --no-cache git lsof certbot openssl;
        rm -rf /tmp/r;
        git clone --depth 1 https://github.com/mohdsuhel2/ai-mini-projects.git /tmp/r;
        chmod +x /tmp/r/document-generator/deploy/docker-entrypoint.sh;
        exec sh /tmp/r/document-generator/deploy/docker-entrypoint.sh
