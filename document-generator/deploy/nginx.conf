server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /fuel-receipt.html;
    }

    location / {
        try_files $uri $uri/ /404.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|woff2|otf|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
