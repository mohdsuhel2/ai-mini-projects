server {
    listen 80;
    server_name noobius.in www.noobius.in bill-receipt.noobius.in;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /fuel-receipt.html;
    }

    location / {
        try_files $uri $uri/ /404.html;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        access_log off;
        log_not_found off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|woff2|otf|pdf|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
